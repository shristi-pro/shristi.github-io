<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Certificates | Portfolio</title>
    <style>
        /* General Styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
            color: #333;
        }

        header {
            text-align: center;
            padding: 50px 20px 20px 20px;
            background-color: #4b6cb7; /* soft blue */
            color: #fff;
        }

        header h1 {
            margin: 0;
            font-size: 2.5em;
        }

        header p {
            font-size: 1.1em;
            margin-top: 10px;
        }

        /* Certificates Section */
        .certificates {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            padding: 40px 20px;
            max-width: 1200px;
            margin: auto;
        }

        .certificate-card {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .certificate-card img {
            width: 100%;
            height: auto;
        }

        .certificate-card h3 {
            margin: 15px 0 5px 0;
            font-size: 1.2em;
        }

        .certificate-card p {
            font-size: 0.95em;
            color: #666;
            margin-bottom: 15px;
        }

        .certificate-card:hover {
            transform: translateY(-5px);
            box-shadow: 0px 8px 25px rgba(0,0,0,0.2);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            background-color: #4b6cb7;
            color: #fff;
        }
    </style>
</head>
<body>
    <header>
        <h1>My Certificates</h1>
        <p>Here are the certifications I have achieved so far.</p>
    </header>

    <section class="certificates">
        <div class="certificate-card">
            <img src="images/certificate1.jpg" alt="Certificate 1">
            <h3>Certified Ethical Hacker (CEH V13)</h3>
            <p>Issued by Infosec Solution | February 2026</p>
        </div>

        <div class="certificate-card">
            <img src="images/certificate2.jpg" alt="Certificate 2">
            <h3>Web Development Bootcamp</h3>
            <p>Issued by Udemy | March 2025</p>
        </div>

        <div class="certificate-card">
            <img src="images/certificate3.jpg" alt="Certificate 3">
            <h3>Python Programming Certificate</h3>
            <p>Issued by Coursera | January 2025</p>
        </div>

        <!-- Add more certificates here -->
    </section>
</body>
</html>
